<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  @keyframes rv-in { from { opacity: .4; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes rv-toast { from { transform: translate(-50%,150%); opacity: 0; } to { transform: translate(-50%,0); opacity: 1; } }
  .rv {
    --bg: #fff9f4; --card: #fff; --s2: #fff3ec;
    --primary: #ff6a3d; --secondary: #ff4d7d; --accent: #7b3fe4; --gold: #ffb23e;
    --text: #2b1b2e; --muted: #7a6770; --border: #f0e1d6; --green: #1fb57a;
    --grad: linear-gradient(135deg,#ffb23e,#ff6a3d 38%,#ff4d7d 72%,#7b3fe4);
    --shadow: 0 1px 2px rgba(43,27,46,.04), 0 14px 34px -20px rgba(43,27,46,.26);
    --fh: "Sora", system-ui, sans-serif; --fb: "Inter", system-ui, sans-serif;
    background: var(--bg); color: var(--text); font-family: var(--fb); min-height: 100dvh; line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  .rv[data-theme="dark"] { --bg: #16101f; --card: #221833; --s2: #2a2040; --primary: #ff7e55; --secondary: #ff6aa0; --accent: #a06bff; --gold: #ffc773; --text: #f6eef2; --muted: #b9a8bc; --border: #34264a; --green: #36c98e; --shadow: 0 1px 2px rgba(0,0,0,.3), 0 16px 40px -20px rgba(0,0,0,.6); }
  .rv h1,.rv h2,.rv h3 { margin: 0; font-family: var(--fh); letter-spacing: -.02em; }
  .rv p { margin: 0; }
  .rv-wrap { max-width: 920px; margin: 0 auto; padding: 0 24px; }

  .rv-nav { position: sticky; top: 0; z-index: 20; background: color-mix(in srgb,var(--bg) 86%,transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .rv-nav-in { display: flex; align-items: center; gap: 12px; height: 60px; }
  .rv-brand { display: flex; align-items: center; gap: 9px; font-family: var(--fh); font-weight: 800; font-size: 16px; } .rv-logo { width: 26px; height: 26px; border-radius: 8px; background: var(--grad); } .rv-crumb { font-size: 13px; color: var(--muted); } .rv-crumb b { color: var(--text); }
  .rv-tgl { margin-left: auto; width: 36px; height: 36px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-size: 14px; }

  .rv-main { padding: 24px 0 60px; }
  .rv-summary { display: grid; grid-template-columns: 200px 1fr; gap: 22px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); margin-bottom: 16px; align-items: center; }
  .rv-big { text-align: center; } .rv-big .n { font-family: var(--fh); font-weight: 800; font-size: 48px; line-height: 1; } .rv-big .st { color: var(--gold); font-size: 16px; letter-spacing: 2px; margin: 6px 0 3px; } .rv-big .c { font-size: 12.5px; color: var(--muted); }
  .rv-bars { display: flex; flex-direction: column; gap: 7px; } .rv-brow { display: flex; align-items: center; gap: 10px; font-size: 12.5px; } .rv-brow .lab { width: 32px; color: var(--muted); } .rv-track { flex: 1; height: 8px; border-radius: 999px; background: var(--s2); overflow: hidden; } .rv-track .f { height: 100%; border-radius: 999px; background: var(--gold); } .rv-brow .pct { width: 36px; text-align: right; color: var(--muted); }

  .rv-tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 14px; scrollbar-width: none; } .rv-tabs::-webkit-scrollbar { display: none; }
  .rv-tab { font: inherit; font-size: 12.5px; font-weight: 600; padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; white-space: nowrap; } .rv-tab.on { background: var(--primary); color: #fff; border-color: transparent; }

  .rv-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 12px; animation: rv-in .3s ease; }
  .rv-top { display: flex; align-items: center; gap: 11px; } .rv-av { width: 38px; height: 38px; border-radius: 50%; background: var(--grad); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 14px; font-family: var(--fh); flex: none; } .rv-top .nm { font-weight: 600; font-size: 13.5px; } .rv-top .meta { font-size: 11.5px; color: var(--muted); } .rv-top .st { color: var(--gold); font-size: 13px; } .rv-feat { margin-left: auto; font-size: 10px; font-weight: 800; color: var(--primary); background: color-mix(in srgb,var(--primary) 12%,transparent); padding: 3px 9px; border-radius: 99px; }
  .rv-body { font-size: 14px; margin: 11px 0; } .rv-prod { font-size: 11.5px; color: var(--accent); font-weight: 600; }
  .rv-reply { background: var(--s2); border-radius: 11px; padding: 12px 14px; margin-top: 10px; font-size: 13px; } .rv-reply .who { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
  .rv-act { display: flex; gap: 8px; margin-top: 11px; } .rv-btn { font: inherit; font-weight: 600; font-size: 12.5px; border: 1px solid var(--border); background: var(--card); color: var(--text); padding: 8px 13px; border-radius: 9px; cursor: pointer; } .rv-btn.on { border-color: var(--primary); color: var(--primary); }
  .rv-replybox { margin-top: 11px; display: flex; gap: 8px; } .rv-replybox input { flex: 1; padding: 10px 12px; font: inherit; font-size: 13px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px; color: var(--text); outline: none; } .rv-replybox button { background: var(--grad); color: #fff; border: 0; border-radius: 9px; padding: 10px 16px; font-family: var(--fh); font-weight: 700; font-size: 12.5px; cursor: pointer; }
  .rv-hidden { opacity: .5; }

  .rv-toastbox { position: fixed; left: 50%; bottom: 24px; z-index: 60; background: #18121f; color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; box-shadow: 0 20px 50px -20px rgba(0,0,0,.6); display: flex; align-items: center; gap: 9px; animation: rv-toast .4s ease; } .rv-toastbox .d { width: 8px; height: 8px; border-radius: 50%; background: #36c98e; }

  @media (max-width: 640px) { .rv-summary { grid-template-columns: 1fr; } }
</style>
</helmet>

<div class="rv" data-theme="{{ theme }}">
  <nav class="rv-nav">
    <div class="rv-wrap rv-nav-in">
      <div class="rv-brand"><span class="rv-logo"></span>invoxai</div>
      <span class="rv-crumb">Dashboard / <b>Reviews</b></span>
      <button class="rv-tgl" onClick="{{ toggle }}">{{ themeIcon }}</button>
    </div>
  </nav>

  <main class="rv-wrap rv-main">
    <div class="rv-summary">
      <div class="rv-big"><div class="n">4.9</div><div class="st">★★★★★</div><div class="c">2,140 reviews</div></div>
      <div class="rv-bars">
        <div class="rv-brow"><span class="lab">5 ★</span><div class="rv-track"><div class="f" style="width:86%"></div></div><span class="pct">86%</span></div>
        <div class="rv-brow"><span class="lab">4 ★</span><div class="rv-track"><div class="f" style="width:10%"></div></div><span class="pct">10%</span></div>
        <div class="rv-brow"><span class="lab">3 ★</span><div class="rv-track"><div class="f" style="width:3%"></div></div><span class="pct">3%</span></div>
        <div class="rv-brow"><span class="lab">2 ★</span><div class="rv-track"><div class="f" style="width:1%"></div></div><span class="pct">1%</span></div>
        <div class="rv-brow"><span class="lab">1 ★</span><div class="rv-track"><div class="f" style="width:0%"></div></div><span class="pct">0%</span></div>
      </div>
    </div>

    <div class="rv-tabs">
      <button class="rv-tab {{ fAll }}" onClick="{{ setAll }}">All</button>
      <button class="rv-tab {{ fUnreplied }}" onClick="{{ setUnreplied }}">Needs reply</button>
      <button class="rv-tab {{ fFeatured }}" onClick="{{ setFeatured }}">Featured</button>
      <button class="rv-tab {{ fLow }}" onClick="{{ setLow }}">Low ratings</button>
    </div>

    <sc-for list="{{ shown }}" as="r" hint-placeholder-count="4">
      <div class="rv-card {{ r.hiddenCls }}">
        <div class="rv-top"><span class="rv-av">{{ r.initial }}</span><div><div class="nm">{{ r.name }}</div><div class="meta"><span class="st">{{ r.stars }}</span> · {{ r.date }}</div></div><sc-if value="{{ r.featured }}" hint-placeholder-val="{{ false }}"><span class="rv-feat">★ Featured</span></sc-if></div>
        <div class="rv-prod">{{ r.product }}</div>
        <p class="rv-body">{{ r.text }}</p>
        <sc-if value="{{ r.hasReply }}" hint-placeholder-val="{{ false }}"><div class="rv-reply"><div class="who">Studio Aanya replied</div>{{ r.reply }}</div></sc-if>
        <sc-if value="{{ r.replying }}" hint-placeholder-val="{{ false }}"><div class="rv-replybox"><input placeholder="Write a reply…" value="{{ r.draft }}" onInput="{{ r.onDraft }}" /><button onClick="{{ r.sendReply }}">Reply</button></div></sc-if>
        <div class="rv-act">
          <sc-if value="{{ r.canReply }}" hint-placeholder-val="{{ true }}"><button class="rv-btn" onClick="{{ r.toggleReply }}">↩ Reply</button></sc-if>
          <button class="rv-btn {{ r.featCls }}" onClick="{{ r.toggleFeat }}">★ {{ r.featLabel }}</button>
          <button class="rv-btn" onClick="{{ r.toggleHide }}">{{ r.hideLabel }}</button>
        </div>
      </div>
    </sc-for>
  </main>

  <sc-if value="{{ toast }}" hint-placeholder-val="{{ false }}">
    <div class="rv-toastbox"><span class="d"></span>{{ toastMsg }}</div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:920,&quot;height&quot;:820}}">
class Component extends DCLogic {
  state = {
    theme: "light", filter: "all", replyId: null, drafts: {},
    items: [
      { id: 1, name: "Rohan Mehta", rating: 5, date: "18 Jun", product: "Mixing Masterclass", text: "Worth ten times the price. My mixes finally translate everywhere.", featured: true, reply: "" },
      { id: 2, name: "Priya Sharma", rating: 5, date: "16 Jun", product: "Mixing Masterclass", text: "The vocal chain lesson alone changed my releases. Crystal clear teaching.", featured: false, reply: "Thank you Priya — so glad it helped! 🎧" },
      { id: 3, name: "Dev Kapoor", rating: 4, date: "14 Jun", product: "Preset Pack Vol.2", text: "Great packs, would love a few more lo-fi options.", featured: false, reply: "" },
      { id: 4, name: "Anon", rating: 2, date: "10 Jun", product: "Preset Pack Vol.2", text: "Files didn't download at first — support sorted it but took a day.", featured: false, reply: "", hidden: false }
    ],
    toast: false, toastMsg: ""
  };
  STARS = ["", "★", "★★", "★★★", "★★★★", "★★★★★"];
  fire(m) { this.setState({ toast: true, toastMsg: m }); clearTimeout(this._t); this._t = setTimeout(() => this.setState({ toast: false }), 1800); }
  componentWillUnmount() { clearTimeout(this._t); }
  upd(id, patch) { this.setState(s => ({ items: s.items.map(i => i.id === id ? { ...i, ...patch } : i) })); }
  renderVals() {
    const s = this.state, on = (k) => (s.filter === k ? "on" : "");
    let list = s.items.filter(i => s.filter === "all" || (s.filter === "unreplied" && !i.reply) || (s.filter === "featured" && i.featured) || (s.filter === "low" && i.rating <= 3));
    const shown = list.map(i => ({
      initial: i.name[0], name: i.name, stars: this.STARS[i.rating], date: i.date, product: i.product, text: i.text,
      featured: i.featured, hasReply: !!i.reply, reply: i.reply, hiddenCls: i.hidden ? "rv-hidden" : "",
      replying: s.replyId === i.id, draft: s.drafts[i.id] || "", canReply: !i.reply && s.replyId !== i.id,
      onDraft: (e) => this.setState(st => ({ drafts: { ...st.drafts, [i.id]: e.target.value } })),
      toggleReply: () => this.setState({ replyId: i.id }),
      sendReply: () => { this.upd(i.id, { reply: s.drafts[i.id] || "Thanks for the feedback!" }); this.setState({ replyId: null }); this.fire("✓ Reply posted"); },
      featCls: i.featured ? "on" : "", featLabel: i.featured ? "Featured" : "Feature",
      toggleFeat: () => { this.upd(i.id, { featured: !i.featured }); this.fire(i.featured ? "Unfeatured" : "★ Featured on product page"); },
      hideLabel: i.hidden ? "Show" : "Hide", toggleHide: () => { this.upd(i.id, { hidden: !i.hidden }); this.fire(i.hidden ? "Review shown" : "Review hidden"); }
    }));
    return {
      theme: s.theme, themeIcon: s.theme === "dark" ? "☀" : "☾",
      toggle: () => this.setState(st => ({ theme: st.theme === "dark" ? "light" : "dark" })),
      fAll: on("all"), fUnreplied: on("unreplied"), fFeatured: on("featured"), fLow: on("low"),
      setAll: () => this.setState({ filter: "all" }), setUnreplied: () => this.setState({ filter: "unreplied" }), setFeatured: () => this.setState({ filter: "featured" }), setLow: () => this.setState({ filter: "low" }),
      shown, toast: s.toast, toastMsg: s.toastMsg
    };
  }
}
</script>
</body>
</html>
