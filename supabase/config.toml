# invoxai.io — Supabase local config.
# Project ref is set when you run `supabase link --project-ref <ref>`.
project_id = "invoxai"

[db]
major_version = 15

[auth]
# Seller dashboard is the default site; subdomains/custom domains are added as
# additional redirect URLs once the app is deployed.
site_url = "https://app.invoxai.io"
additional_redirect_urls = [
  "http://localhost:3000",
  "https://app.invoxai.io",
  "https://admin.invoxai.io",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Email OTP (magic-code) login per spec — not magic links.
enable_confirmations = true
otp_length = 6
otp_expiry = 600

# Google OAuth — fill secrets via env when linking the hosted project.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

[storage]
enabled = true
